<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <!-- Outer blue circle -->
  <circle cx="100" cy="100" r="98" fill="#2176C7" stroke="#1a5fa8" stroke-width="2"/>
  <!-- Inner white circle -->
  <circle cx="100" cy="100" r="78" fill="white"/>
  <!-- Globe/swirl background -->
  <circle cx="100" cy="100" r="72" fill="#e8e8e8"/>
  <!-- Swirl lines -->
  <path d="M60,60 Q100,40 140,60 Q160,100 140,140 Q100,160 60,140 Q40,100 60,60" fill="none" stroke="#ccc" stroke-width="3"/>
  <path d="M65,55 Q100,35 135,55 Q158,100 135,145 Q100,165 65,145 Q42,100 65,55" fill="none" stroke="#bbb" stroke-width="2"/>
  <path d="M70,65 Q100,50 130,65 Q148,100 130,135 Q100,150 70,135 Q52,100 70,65" fill="none" stroke="#ccc" stroke-width="2"/>
  <path d="M75,70 Q100,58 125,70 Q140,100 125,130 Q100,142 75,130 Q60,100 75,70" fill="none" stroke="#bbb" stroke-width="2"/>
  <!-- Gold emblem/coin in center -->
  <circle cx="100" cy="100" r="18" fill="#f5a623" stroke="#d4891a" stroke-width="2"/>
  <circle cx="100" cy="100" r="13" fill="#e8960f"/>
  <!-- Gold hook/symbol -->
  <path d="M95,88 Q88,95 92,105 Q96,112 104,110 Q112,108 112,100 Q112,92 104,90" fill="none" stroke="#f5a623" stroke-width="5" stroke-linecap="round"/>
  <line x1="112" y1="100" x2="118" y2="118" stroke="#f5a623" stroke-width="5" stroke-linecap="round"/>
  <!-- Stars -->
  <text x="28" y="104" fill="white" font-size="12" text-anchor="middle">★</text>
  <text x="172" y="104" fill="white" font-size="12" text-anchor="middle">★</text>
  <!-- Amharic text at top -->
  <path id="topArc" d="M 20,100 A 80,80 0 0,1 180,100" fill="none"/>
  <text font-size="11" fill="white" font-weight="bold" font-family="serif">
    <textPath href="#topArc" startOffset="10%">የገቢዎች ሚኒስቴር</textPath>
  </text>
  <!-- English text at bottom -->
  <path id="bottomArc" d="M 18,105 A 82,82 0 0,0 182,105" fill="none"/>
  <text font-size="10" fill="white" font-weight="bold" font-family="Arial, sans-serif">
    <textPath href="#bottomArc" startOffset="8%">Ministry of Revenues</textPath>
  </text>
</svg>
