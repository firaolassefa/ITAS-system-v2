<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Background Circle with Ethiopian Flag Colors -->
  <defs>
    <linearGradient id="flagGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#078930;stop-opacity:0.2" />
      <stop offset="50%" style="stop-color:#FCDD09;stop-opacity:0.2" />
      <stop offset="100%" style="stop-color:#DA121A;stop-opacity:0.2" />
    </linearGradient>
  </defs>
  
  <!-- Outer Circle -->
  <circle cx="100" cy="100" r="95" fill="url(#flagGradient)"/>
  
  <!-- Main Shield/Circle -->
  <circle cx="100" cy="100" r="80" fill="#078930" stroke="#056622" stroke-width="3"/>
  
  <!-- Inner Highlight -->
  <circle cx="100" cy="100" r="70" fill="#10b759" opacity="0.3"/>
  
  <!-- Ethiopian National Emblem - Blue Disc -->
  <circle cx="100" cy="85" r="35" fill="#0F47AF" stroke="#0A3380" stroke-width="2"/>
  
  <!-- Golden Pentagram (5-pointed star) -->
  <path d="M100 55 L105 70 L121 70 L108 80 L113 95 L100 85 L87 95 L92 80 L79 70 L95 70 Z" 
        fill="#FCDD09" stroke="#E8C307" stroke-width="1.5"/>
  
  <!-- Star Rays (5 rays emanating from star) -->
  <g fill="#FCDD09" opacity="0.8">
    <path d="M100 50 L98 65 L102 65 Z"/>
    <path d="M122 72 L110 78 L115 82 Z"/>
    <path d="M115 96 L108 88 L112 84 Z"/>
    <path d="M85 96 L88 84 L92 88 Z"/>
    <path d="M78 72 L85 82 L90 78 Z"/>
  </g>
  
  <!-- MOR Text -->
  <text x="100" y="145" font-family="Arial, sans-serif" font-size="28" font-weight="bold" 
        fill="#ffffff" text-anchor="middle" letter-spacing="2">MOR</text>
  
  <!-- Ethiopia Text -->
  <text x="100" y="165" font-family="Arial, sans-serif" font-size="11" font-weight="600" 
        fill="#FCDD09" text-anchor="middle" letter-spacing="1">ETHIOPIA</text>
  
  <!-- Decorative Border with Flag Colors -->
  <circle cx="100" cy="100" r="95" fill="none" stroke="#FCDD09" stroke-width="2" opacity="0.6"/>
  <circle cx="100" cy="100" r="92" fill="none" stroke="#DA121A" stroke-width="1" opacity="0.4"/>
</svg>
