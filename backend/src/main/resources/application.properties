# ========== EMAIL CONFIGURATION ==========
# Enable/disable email sending (set to true to actually send emails)
app.email.enabled=false

# Email Configuration - Gmail SMTP (for testing)
# To use Gmail:
# 1. Enable 2-factor authentication on your Gmail account
# 2. Generate an "App Password" at https://myaccount.google.com/apppasswords
# 3. Use the app password below (not your regular Gmail password)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=your-email@gmail.com
spring.mail.password=your-app-password
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

# Alternative: Use SendGrid (recommended for production)
# spring.mail.host=smtp.sendgrid.net
# spring.mail.port=587
# spring.mail.username=apikey
# spring.mail.password=your-sendgrid-api-key

# Alternative: Use AWS SES
# spring.mail.host=email-smtp.us-east-1.amazonaws.com
# spring.mail.port=587
# spring.mail.username=your-aws-smtp-username
# spring.mail.password=your-aws-smtp-password

# ========== SMS CONFIGURATION ==========
# Enable/disable SMS sending (set to true to actually send SMS)
app.sms.enabled=false

# Twilio Configuration (for SMS)
# Sign up at https://www.twilio.com/try-twilio
# Get your credentials from the Twilio Console
twilio.account.sid=your-twilio-account-sid
twilio.auth.token=your-twilio-auth-token
twilio.phone.number=+1234567890

