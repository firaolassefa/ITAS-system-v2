# ── Server ────────────────────────────────────────────────────────────────────
server.port=9090
server.servlet.context-path=/api
server.tomcat.threads.max=50
server.tomcat.threads.min-spare=5
server.tomcat.connection-timeout=20000
server.tomcat.basedir=./tomcat-work

# ── PostgreSQL (Neon Cloud) ───────────────────────────────────────────────────
spring.datasource.url=jdbc:postgresql://ep-hidden-king-aiwufvo3-pooler.c-4.us-east-1.aws.neon.tech/neondb?sslmode=require&channel_binding=require
spring.datasource.username=neondb_owner
spring.datasource.password=npg_sCb7FRYEPhL0
spring.datasource.driver-class-name=org.postgresql.Driver

# HikariCP connection pool — critical for cloud DB performance
spring.datasource.hikari.pool-name=ITASPool
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.max-lifetime=1200000
# Keep connections alive (prevents Neon from sleeping)
spring.datasource.hikari.keepalive-time=60000
spring.datasource.hikari.connection-test-query=SELECT 1

# ── JPA / Hibernate ───────────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

# ── Spring Cache ──────────────────────────────────────────────────────────────
spring.cache.type=simple

# ── Swagger / SpringDoc — disable in production to speed up startup ───────────
springdoc.api-docs.enabled=false
springdoc.swagger-ui.enabled=false

# ── JWT ───────────────────────────────────────────────────────────────────────
app.jwt.secret=itas-tax-education-system-secret-key-2024-change-this-in-production-use-env-variable
app.jwt.expiration=28800000

# ── File Upload ───────────────────────────────────────────────────────────────
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=100MB
spring.servlet.multipart.max-request-size=100MB
spring.servlet.multipart.file-size-threshold=2KB
spring.servlet.multipart.location=${java.io.tmpdir}
file.upload-dir=uploads
app.file.upload-dir=uploads

# ── Email (disabled — set app.email.enabled=true to activate) ────────────────
app.email.enabled=false
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=your-email@gmail.com
spring.mail.password=your-app-password
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000
# Disable mail auto-config when not needed (saves startup time)
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.mail.MailSenderAutoConfiguration

# ── SMS (disabled) ────────────────────────────────────────────────────────────
app.sms.enabled=false
twilio.account.sid=your-twilio-account-sid
twilio.auth.token=your-twilio-auth-token
twilio.phone.number=+1234567890

# ── TIN Verification ──────────────────────────────────────────────────────────
mor.tin.api.enabled=false
mor.tin.api.url=http://your-mor-tin-api-server/api/tin/verify
mor.tin.api.key=your-api-key-here

# ── Logging — reduce noise in production ─────────────────────────────────────
logging.level.root=WARN
logging.level.com.itas=INFO
logging.level.org.hibernate.SQL=OFF
logging.level.org.hibernate.type.descriptor.sql=OFF
logging.level.org.springframework.security=WARN
